  <path d="M168 224 L120 272 L168 320" stroke="url(#g4)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M344 224 L392 272 L344 320" stroke="url(#g4)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Center slash -->
  <line x1="280" y1="200" x2="232" y2="344" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
  <!-- Top "on" indicator -->
  <circle cx="256" cy="108" r="14" fill="url(#g4b)"/>
  <circle cx="256" cy="108" r="8" fill="#4ade80" opacity="0.5"/>
</svg>
