<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Option 4: Hexagonal card with code brackets — tech + craft fusion -->
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g4b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Hexagonal shape — represents a "card" -->
  <path d="M256 48 L432 144 L432 368 L256 464 L80 368 L80 144 Z" fill="#0f172a" stroke="url(#g4)" stroke-width="6"/>
