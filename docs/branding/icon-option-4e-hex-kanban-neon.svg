<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Option 4E: Neon/glow aesthetic — dark bg, glowing outlines -->
  <defs>
    <linearGradient id="g4e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g4eg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hexagonal shape with glow -->
  <path d="M256 48 L432 144 L432 368 L256 464 L80 368 L80 144 Z" fill="#050a18" stroke="url(#g4e)" stroke-width="4" filter="url(#glow)"/>
  <!-- Code brackets < > with glow -->
  <path d="M136 224 L96 272 L136 320" stroke="url(#g4e)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <path d="M376 224 L416 272 L376 320" stroke="url(#g4e)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Three kanban columns — outline style with glow -->
  <rect x="176" y="204" width="36" height="24" rx="4" fill="none" stroke="#475569" stroke-width="2"/>
  <rect x="176" y="236" width="36" height="24" rx="4" fill="none" stroke="#475569" stroke-width="2"/>
  <rect x="176" y="268" width="36" height="24" rx="4" fill="none" stroke="#334155" stroke-width="2"/>
  <rect x="176" y="300" width="36" height="24" rx="4" fill="none" stroke="#334155" stroke-width="1.5"/>
  <rect x="238" y="204" width="36" height="24" rx="4" fill="none" stroke="url(#g4e)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="238" y="236" width="36" height="24" rx="4" fill="none" stroke="url(#g4e)" stroke-width="2" opacity="0.6"/>
  <rect x="300" y="204" width="36" height="24" rx="4" fill="none" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="300" y="236" width="36" height="24" rx="4" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <!-- "On" indicator with strong glow -->
  <circle cx="256" cy="108" r="14" fill="url(#g4eg)" filter="url(#glow-strong)"/>
  <circle cx="256" cy="108" r="6" fill="#fff" opacity="0.8"/>
</svg>
