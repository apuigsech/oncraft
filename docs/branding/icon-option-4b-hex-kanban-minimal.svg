<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Option 4B: Cleaner version — brackets are larger, columns more prominent, no backgrounds on columns -->
  <defs>
    <linearGradient id="g4b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g4bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Hexagonal shape -->
  <path d="M256 48 L432 144 L432 368 L256 464 L80 368 L80 144 Z" fill="#0f172a" stroke="url(#g4b)" stroke-width="6"/>
  <!-- Large code brackets < > -->
  <path d="M128 216 L80 272 L128 328" stroke="url(#g4b)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M384 216 L432 272 L384 328" stroke="url(#g4b)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Three kanban columns — just stacked cards, no column background -->
  <!-- Column 1: backlog (muted) -->
  <rect x="176" y="196" width="36" height="24" rx="4" fill="#475569"/>
  <rect x="176" y="228" width="36" height="24" rx="4" fill="#475569"/>
  <rect x="176" y="260" width="36" height="24" rx="4" fill="#475569"/>
  <rect x="176" y="292" width="36" height="24" rx="4" fill="#334155"/>
  <rect x="176" y="324" width="36" height="24" rx="4" fill="#334155"/>
  <!-- Column 2: in progress (gradient, active) -->
  <rect x="238" y="196" width="36" height="24" rx="4" fill="url(#g4b)"/>
  <rect x="238" y="228" width="36" height="24" rx="4" fill="url(#g4b)" opacity="0.7"/>
  <rect x="238" y="260" width="36" height="24" rx="4" fill="url(#g4b)" opacity="0.4"/>
  <!-- Column 3: done (green) -->
  <rect x="300" y="196" width="36" height="24" rx="4" fill="#22c55e"/>
  <rect x="300" y="228" width="36" height="24" rx="4" fill="#22c55e" opacity="0.7"/>
  <!-- "On" indicator -->
  <circle cx="256" cy="108" r="14" fill="url(#g4bg)"/>
  <circle cx="256" cy="108" r="8" fill="#4ade80" opacity="0.5"/>
</svg>
