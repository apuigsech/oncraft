  </defs>
  <!-- Three kanban columns -->
  <rect x="80" y="160" width="88" height="240" rx="12" fill="#1e293b" stroke="#475569" stroke-width="4"/>
  <rect x="212" y="160" width="88" height="240" rx="12" fill="#1e293b" stroke="#475569" stroke-width="4"/>
  <rect x="344" y="160" width="88" height="240" rx="12" fill="#1e293b" stroke="#475569" stroke-width="4"/>
  <!-- Cards in columns -->
