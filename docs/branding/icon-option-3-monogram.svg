<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Option 3: Bold "O" monogram with power/on indicator and inner craft angle -->
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Outer ring — the "O" -->
  <circle cx="256" cy="272" r="176" stroke="url(#g3)" stroke-width="40" fill="none"/>
  <!-- Power symbol line — the "on" -->
  <rect x="240" y="80" width="32" height="144" rx="16" fill="url(#g3)"/>
  <!-- Inner accent — small diamond/craft mark -->
  <path d="M256 232 L280 272 L256 312 L232 272 Z" fill="url(#g3)" opacity="0.4"/>
</svg>
