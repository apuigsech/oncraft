<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Option 5: Abstract hammer/cursor — minimal, iconic, like Vercel's triangle -->
  <defs>
    <linearGradient id="g5" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Hammer head — bold, geometric -->
  <rect x="128" y="112" width="256" height="96" rx="16" fill="url(#g5)"/>
  <!-- Handle — angled, dynamic -->
  <rect x="232" y="208" width="48" height="224" rx="8" fill="url(#g5)"/>
  <!-- Strike spark — the "on" moment -->
  <circle cx="152" cy="100" r="10" fill="#3b82f6"/>
  <circle cx="180" cy="84" r="6" fill="#6366f1" opacity="0.7"/>
  <circle cx="144" cy="76" r="4" fill="#8b5cf6" opacity="0.5"/>
</svg>
