name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Run tests first as a gate
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm test

  # Build for all platforms
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            sidecar-triple: aarch64-apple-darwin
            bundles: dmg
          - runner: macos-latest
            target: x86_64-apple-darwin
            sidecar-triple: x86_64-apple-darwin
            bundles: dmg
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-triple: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-triple: x86_64-pc-windows-msvc
            bundles: msi,nsis

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- System dependencies (Linux) ---
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # --- Toolchains ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # --- Rust cache ---
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- Install frontend deps ---
      - run: pnpm install

      # --- Build sidecar for this platform ---
      - name: Build sidecar
        shell: bash
        run: |
          cd src-sidecar
          bun install
          bun build --compile --target=bun agent-bridge.ts \
            --outfile ../src-tauri/binaries/agent-bridge-${{ matrix.sidecar-triple }}

      # --- Build Nuxt frontend ---
      - run: pnpm build

      # --- Build Tauri app (skip beforeBuildCommand — sidecar + frontend already built) ---
      - name: Build Tauri app
        shell: bash
        env:
          TAURI_CONFIG: '{"build":{"beforeBuildCommand":""}}'
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # --- Upload artifacts for release job ---
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oncraft-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe

  # Create GitHub Release with all artifacts
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            LOG=$(git log --oneline "$PREV_TAG".."${{ github.ref_name }}" --no-merges)
            # Use a delimiter for multiline output
            {
              echo "body<<CHANGELOG_EOF"
              echo "$LOG"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'OnCraft ${{ github.ref_name }}'
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: artifacts/**/*
