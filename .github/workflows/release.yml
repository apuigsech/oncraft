name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Run tests first as a gate
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm test

  # Build and release for all platforms
  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            sidecar-triple: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
            sidecar-triple: x86_64-apple-darwin
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-triple: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- System dependencies (Linux) ---
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # --- Toolchains ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # --- Rust cache ---
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- Install frontend deps ---
      - run: pnpm install

      # --- Build sidecar for this platform ---
      - name: Build sidecar
        shell: bash
        run: |
          cd src-sidecar
          bun install
          bun build --compile --target=bun agent-bridge.ts \
            --outfile ../src-tauri/binaries/agent-bridge-${{ matrix.sidecar-triple }}

      # --- Build Nuxt frontend ---
      - run: pnpm build

      # --- Build Tauri + create GitHub Release ---
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OnCraft ${{ github.ref_name }}'
          releaseBody: |
            See the full changelog at https://github.com/apuigsech/oncraft/commits/${{ github.ref_name }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          args: --target ${{ matrix.target }}
          beforeBuildCommand: ''
